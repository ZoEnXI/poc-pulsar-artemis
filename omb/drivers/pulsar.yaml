###############################################################################
# OMB Driver — Apache Pulsar 3.0.17
# Client : pulsar-client-all 2.11.0 (driver-pulsar/pom.xml d'OMB)
#
# Compatibilité : client 2.11.0 contre broker 3.0.17 — supporté par le
# protocole binaire Pulsar (backward compat N-1 major version).
#
# Durabilité alignée avec Phase 1 (standalone.conf) :
#   - Topics persistent:// uniquement
#   - Ack producteur = LEDGER (attend l'ack du bookie) — équivalent fsync
#   - Pas de batching producteur (latence non masquée)
#   - Subscription Exclusive pour bench point-à-point ; Key_Shared documenté
###############################################################################
name: Pulsar

driverClass: io.openmessaging.benchmark.driver.pulsar.PulsarBenchmarkDriver

# --- Connexion broker -------------------------------------------------------
serviceUrl: "pulsar://pulsar:6650"
httpUrl: "http://pulsar:8080"

# --- Durabilité producteur --------------------------------------------------
producerConfig:
  # LEDGER : le broker répond seulement après persistance BookKeeper (fsync)
  sendTimeoutMs: 30000
  blockIfQueueFull: true
  batchingEnabled: false          # désactivé → latence réelle visible
  maxPendingMessages: 1000

# --- Consommateur -----------------------------------------------------------
consumerConfig:
  subscriptionType: Exclusive     # Exclusive = 1 conso/partition (comparable)
  receiverQueueSize: 1000

# --- Topologie par défaut (workloads peuvent surcharger) -------------------
# Le partitionnement par clé (Key_Shared) est activé workload par workload
# pour les scénarios assurance (ordre par contractId).
topicName: "persistent://public/default/benchmark"
