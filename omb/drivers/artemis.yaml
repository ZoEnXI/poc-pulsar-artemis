###############################################################################
# OMB Driver — Apache ActiveMQ Artemis 2.36.0
# Client : artemis-core-client 2.23.1 (driver-artemis/pom.xml d'OMB)
#
# Compatibilité : client 2.23.1 contre broker 2.36.0 — protocole Core 2.x
# rétro-compatible (même génération major, évolutions mineures du protocole).
#
# Durabilité alignée avec Phase 1 (broker.xml) :
#   - Files durables (durable=true automatique avec auto-create)
#   - journal-sync-transactional=true ET journal-sync-non-transactional=true
#     → fsync à chaque message, quel que soit le mode
#   - address-full-policy=BLOCK → back-pressure réel, pas de drop silencieux
#
# LIMITE CONNUE DU DRIVER ARTEMIS D'OMB :
#   Le driver io.openmessaging.benchmark.driver.artemis.ArtemisDriver ne
#   supporte qu'UN SEUL producteur et UN SEUL consommateur par queue.
#   Contrairement aux drivers Pulsar et RabbitMQ qui acceptent N > 1.
#   Conséquence : les workloads multi-producteurs/consommateurs doivent être
#   conçus autour de cette limite (voir METHODOLOGY.md §3 et les workloads).
###############################################################################
name: Artemis

driverClass: io.openmessaging.benchmark.driver.artemis.ArtemisDriver

# --- Connexion broker -------------------------------------------------------
# Protocole Core natif (tcp + CORE)
brokerUrl: "tcp://artemis:61616?protocols=CORE"
username: artemis
password: artemis

# --- Durabilité producteur --------------------------------------------------
# Le driver core-client envoie des messages durable=true par défaut.
# journal-sync-non-transactional=true dans broker.xml garantit le fsync.

# --- Topologie --------------------------------------------------------------
# Queue simple (ANYCAST) — le driver ne supporte pas de partitionnement natif.
# La parité de topologie avec Pulsar et RabbitMQ est normalisée sur 1P/1C
# dans les workloads, ou via des topics multiples (voir METHODOLOGY.md).
queueName: "benchmark"
