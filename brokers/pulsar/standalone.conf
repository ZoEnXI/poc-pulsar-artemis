###############################################################################
# Pulsar standalone.conf — iso-durabilité disque maximale mono-nœud
# Image : apachepulsar/pulsar:3.0.17
#
# Garantie durabilité :
#   journalSyncData=true  → fsync du journal BookKeeper à chaque entrée
#   ensemble/writeQuorum/ackQuorum=1 → mono-bookie, pas de réplication
#     (la réplication N-way via Ensembles BookKeeper est un avantage
#      qualitatif de Pulsar en multi-nœud, hors périmètre mono-machine)
###############################################################################

# --- Service URLs ---------------------------------------------------------
brokerServicePort=6650
webServicePort=8080

# --- Durabilité BookKeeper (journal fsync) ---------------------------------
# journalSyncData : force un fsync après chaque écriture dans le journal.
# Équivalent à O_DSYNC sur le fichier journal. Garantit la persistance disque
# avant d'acquitter le producteur.
journalSyncData=true

# Quorum mono-nœud : ensemble=1, write=1, ack=1
# L'ack producteur n'est retourné qu'après confirmation du bookie unique.
managedLedgerDefaultEnsembleSize=1
managedLedgerDefaultWriteQuorum=1
managedLedgerDefaultAckQuorum=1

# --- Batching producteur (désactivé pour les tests de latence) -----------
# Les workloads OMB contrôlent eux-mêmes le batching via leurs configs driver.
# On désactive le batching côté broker pour ne pas masquer la latence réelle.
# (Le driver OMB pulsar.yaml précise également batchingEnabled=false)

# --- Stockage des topics --------------------------------------------------
# Tous les topics créés sont persistent:// par défaut.
defaultNumPartitions=4

# --- ZooKeeper embarqué (standalone) -------------------------------------
zookeeperServers=127.0.0.1:2181
configurationStoreServers=127.0.0.1:2181

# --- Logs / monitoring ----------------------------------------------------
managedLedgerStatsPeriodSeconds=60
