## RabbitMQ 4.0.9 — iso-durabilité disque maximale mono-nœud
## Garantie durabilité :
##   quorum queues  → Raft log, fsync-on-commit par défaut
##   delivery_mode=2 (persistent) → messages stockés sur disque
##   publisher confirms → ack producteur seulement après persist + fsync

## Activer le plugin management (déjà inclus dans l'image management)
## et le chargement des définitions au démarrage
management.load_definitions = /etc/rabbitmq/definitions.json

## Politique de durabilité par défaut des messages
## (les workloads OMB fixent delivery_mode=2 côté client)
## Ici on force la politique au niveau broker pour éviter tout message transient.
## classic_queues.default_message_persistence = true  # N/A : on utilise quorum queues

## Logs
log.console = true
log.console.level = warning

## Limites ressources (mono-machine benchmark)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 1GB

## Heartbeat (réduit pour détecter les disconnects pendant les runs OMB)
heartbeat = 60
